<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SYSTEM ODJAZDÓW W EUROPIE</title>

<style>
body{
    margin:0;
    background:black;
    color:#ffcc00;
    font-family:Arial;
}

header{
    background:#111;
    padding:15px;
    text-align:center;
    font-size:40px;
    border-bottom:4px solid #ffcc00;
}

#menu{
    display:flex;
    gap:10px;
    padding:10px;
    background:#0a0a0a;
    flex-wrap:wrap;
    align-items:center;
    position:relative;
}

#search{
    padding:10px;
    width:320px;
    background:#111;
    color:#ffcc00;
    border:1px solid #333;
}

select,button{
    padding:10px;
    background:#111;
    color:#ffcc00;
    border:1px solid #333;
    cursor:pointer;
}

#results{
    position:absolute;
    top:60px;
    left:10px;
    background:#111;
    width:320px;
    max-height:250px;
    overflow:auto;
    display:none;
    border:1px solid #333;
    z-index:9999;
}

.item{
    padding:10px;
    cursor:pointer;
}

.item:hover{background:#222;}

table{
    width:100%;
    border-collapse:collapse;
    font-size:20px;
}

th,td{
    padding:10px;
    text-align:center;
    border-bottom:1px solid #222;
}

th{
    background:#111;
    border-bottom:3px solid #ffcc00;
}

tr:nth-child(even){background:#0a0a0a;}

.on{color:#00ff66;}
</style>
</head>

<body>

<header>SYSTEM ODJAZDÓW W EUROPIE</header>

<div id="menu">
<input id="search" placeholder="Lublin Główny...">
<button onclick="toggleFullscreen()">PEŁNY EKRAN</button>
<div id="results"></div>
</div>

<table>
<thead>
<tr>
<th>Typ</th>
<th>Linia</th>
<th>Cel podróży</th>
<th>Peron</th>
<th>Wagony</th>
<th>Zatrzymuje się na</th>
<th>Odjazd</th>
<th>Status</th>
</tr>
</thead>
<tbody id="board"></tbody>
</table>

<audio id="gong"></audio>

<script>

/* ================= DATA ================= */

let stops=[], stopTimes=[], trips=[], routes=[];
let currentStop=null;

let announced={};

let stopsById={}, tripsById={}, routesById={};
let stopTimesByStop={}, stopTimesByTrip={};
let callingAtCache={};

/* ================= DEFAULT STOP ================= */

const DEFAULT_STOP_NAME="Lublin Główny";

/* ================= SEARCH ================= */

const searchInput=document.getElementById("search");
const resultsBox=document.getElementById("results");

searchInput.addEventListener("input",()=>{

    const q=searchInput.value.toLowerCase();
    resultsBox.innerHTML="";

    const found=stops.filter(s=>s.stop_name?.toLowerCase().includes(q)).slice(0,20);

    found.forEach(s=>{
        const div=document.createElement("div");
        div.className="item";
        div.textContent=s.stop_name;

        div.onclick=()=>{
            currentStop=s.stop_id;
            searchInput.value=s.stop_name;
            resultsBox.style.display="none";
            render();
        };

        resultsBox.appendChild(div);
    });

    resultsBox.style.display="block";
});

/* ================= CSV ================= */

function parseCSV(text){
    const lines=text.split("\n").filter(Boolean);
    const h=lines[0].split(",");
    return lines.slice(1).map(l=>{
        const o={};
        l.split(",").forEach((v,i)=>o[h[i]]=v);
        return o;
    });
}

/* ================= TIME ================= */

function timeToSeconds(t){
    if(!t) return 999999;
    const [h,m,s]=t.split(":").map(Number);
    return h*3600+m*60+(s||0);
}

function countdown(time){
    const now=new Date();
    const nowSec=now.getHours()*3600+now.getMinutes()*60+now.getSeconds();
    let diff=timeToSeconds(time)-nowSec;

    if(diff<=0) return "ODJECHAŁ";

    const h=Math.floor(diff/3600);
    diff%=3600;
    const m=Math.floor(diff/60);
    const s=diff%60;

    return `${h}h ${m}m ${s}s`;
}

/* ================= VOICE (ONLY GOOGLE PL) ================= */

function speak(text){

    speechSynthesis.cancel();

    const u=new SpeechSynthesisUtterance(text);
    u.rate=0.75;
    u.lang="pl-PL";

    const voices=speechSynthesis.getVoices();

    const googlePL =
        voices.find(v=>v.lang==="pl-PL" && v.name.toLowerCase().includes("google")) ||
        voices.find(v=>v.lang==="pl-PL");

    if(googlePL) u.voice=googlePL;

    speechSynthesis.speak(u);
}

/* ================= GTFS AUTO LOAD ================= */

async function loadGTFS(){

    const JSZipLib=(await import("https://cdn.jsdelivr.net/npm/jszip@3.10.1/+esm")).default;

    const file=await fetch("gtfs.zip");
    const zip=await JSZipLib.loadAsync(await file.arrayBuffer());

    const read=async n=>(await zip.file(n).async("string"));

    stops=parseCSV(await read("stops.txt"));
    stopTimes=parseCSV(await read("stop_times.txt"));
    trips=parseCSV(await read("trips.txt"));
    routes=parseCSV(await read("routes.txt"));

    stops.forEach(s=>stopsById[s.stop_id]=s);
    trips.forEach(t=>tripsById[t.trip_id]=t);
    routes.forEach(r=>routesById[r.route_id]=r);

    stopTimes.forEach(st=>{

        if(!stopTimesByStop[st.stop_id]) stopTimesByStop[st.stop_id]=[];
        if(!stopTimesByTrip[st.trip_id]) stopTimesByTrip[st.trip_id]=[];

        stopTimesByStop[st.stop_id].push(st);
        stopTimesByTrip[st.trip_id].push(st);
    });

    for(const id in stopTimesByTrip){
        stopTimesByTrip[id].sort((a,b)=>a.stop_sequence-b.stop_sequence);
    }

    const def=stops.find(s=>s.stop_name===DEFAULT_STOP_NAME);
    if(def){
        currentStop=def.stop_id;
        searchInput.value=DEFAULT_STOP_NAME;
    }

    render();
}

loadGTFS();

/* ================= CALLING AT FIX ================= */

function getCallingAt(tripId,stopId){

    const key=tripId+"_"+stopId;
    if(callingAtCache[key]) return callingAtCache[key];

    const list=stopTimesByTrip[tripId]||[];
    let found=false;
    const out=[];

    for(const s of list){
        if(s.stop_id===stopId){found=true;continue;}
        if(found && stopsById[s.stop_id]) out.push(stopsById[s.stop_id].stop_name);
    }

    return callingAtCache[key]=out.length?out.join(", "):"Brak dalszych przystanków";
}

/* ================= RENDER ================= */

function render(){

    if(!currentStop) return;

    const now=new Date();
    const nowSec=now.getHours()*3600+now.getMinutes()*60+now.getSeconds();

    const list=stopTimesByStop[currentStop]||[];

    const bestTrips=new Map(); // 🔥 FIX DUPLICATES

    for(const t of list){

        const dep=timeToSeconds(t.departure_time);

        // tylko przyszłe odjazdy
        if(dep < nowSec) continue;

        const trip=tripsById[t.trip_id];
        if(!trip) continue;

        // 🔥 ONLY FIRST (earliest) occurrence per trip
        if(!bestTrips.has(t.trip_id) || dep < bestTrips.get(t.trip_id).dep){

            bestTrips.set(t.trip_id,{
                trip:trip,
                time:t.departure_time,
                platform:t.platform_code||"?",
                dep:dep
            });
        }
    }

    const board=document.getElementById("board");
    board.innerHTML="";

    const seen=new Set(); // extra safety

    for(const d of bestTrips.values()){

        if(seen.has(d.trip.trip_id)) continue;
        seen.add(d.trip.trip_id);

        const route=routesById[d.trip.route_id];
        const line=route?.route_short_name||"IC";

        const calling=getCallingAt(d.trip.trip_id,currentStop);

        const diff=d.dep-nowSec;

        const tr=document.createElement("tr");

        tr.innerHTML=`
        <td>POCIĄG</td>
        <td>${line}</td>
        <td>${d.trip.trip_headsign}</td>
        <td>${d.platform}</td>
        <td>8</td>
        <td>${calling}</td>
        <td>${countdown(d.time)}</td>
        <td class="on">ODJAZD</td>
        `;

        board.appendChild(tr);

        // 🔊 announcement 3 min before departure
        const key=d.trip.trip_id+"_"+d.time;

        if(!announced[key] && diff<=180 && diff>0){
            announce({
                trip:d.trip,
                platform:d.platform
            });
            announced[key]=true;
        }

        // 🧹 remove 15s after departure
        if(diff<=-15){
            tr.remove();
        }
    }
}
/* ================= ANNOUNCEMENTS (FULL RESTORED) ================= */

function announce(d){

    const platform=d.platform||"?";

    const operator="Pociąg";

    const text=
`Peron ${platform}, pociąg ${operator} do ${d.trip.trip_headsign}, zatrzymuje się na: ${getCallingAt(d.trip.trip_id,currentStop)}.`;

    speak(text);
}

/* ================= LOOP ================= */

setInterval(()=>{render();},1000);

function toggleFullscreen(){
    document.documentElement.requestFullscreen();
}

</script>
</body>
</html>
