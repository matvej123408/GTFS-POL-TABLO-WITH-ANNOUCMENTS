<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SYSTEM ODJAZDÓW W EUROPIE</title>

<style>
body{
    margin:0;
    background:black;
    color:#ffcc00;
    font-family:Arial;
}

header{
    background:#111;
    padding:15px;
    text-align:center;
    font-size:40px;
    border-bottom:4px solid #ffcc00;
}

#menu{
    display:flex;
    gap:10px;
    padding:10px;
    background:#0a0a0a;
    flex-wrap:wrap;
    align-items:center;
}

#search{
    padding:10px;
    width:320px;
    background:#111;
    color:#ffcc00;
    border:1px solid #333;
}

button{
    padding:10px;
    background:#111;
    color:#ffcc00;
    border:1px solid #333;
}

#results{
    position:absolute;
    top:60px;
    left:10px;
    background:#111;
    width:320px;
    max-height:250px;
    overflow:auto;
    display:none;
    border:1px solid #333;
}

.item{padding:10px;cursor:pointer;}
.item:hover{background:#222;}

table{
    width:100%;
    border-collapse:collapse;
    font-size:20px;
}

th,td{
    padding:10px;
    text-align:center;
    border-bottom:1px solid #222;
}

th{
    background:#111;
    border-bottom:3px solid #ffcc00;
}

.on{color:#00ff66;}
</style>
</head>

<body>

<header>SYSTEM ODJAZDÓW W EUROPIE</header>

<div id="menu">
<input id="search" placeholder="Szukaj stacji...">
<button onclick="toggleFullscreen()">PEŁNY EKRAN</button>
<div id="results"></div>
</div>

<table>
<thead>
<tr>
<th>Typ</th>
<th>Linia</th>
<th>Cel podróży</th>
<th>Peron</th>
<th>Wagony</th>
<th>Zatrzymuje się na</th>
<th>Odjazd</th>
<th>Status</th>
</tr>
</thead>
<tbody id="board"></tbody>
</table>

<script>

/* ================= DATA ================= */
let stops=[], stopTimes=[], trips=[], routes=[];
let currentStop=null;

let announced={};
let stopsById={}, tripsById={}, routesById={};
let stopTimesByStop={}, stopTimesByTrip={};

let DEFAULT_STATION="Lublin Główny";

/* ================= SEARCH ================= */
const searchInput=document.getElementById("search");
const resultsBox=document.getElementById("results");

searchInput.addEventListener("input",()=>{

    const q=searchInput.value.toLowerCase();
    resultsBox.innerHTML="";

    stops.filter(s=>s.stop_name?.toLowerCase().includes(q))
    .slice(0,30)
    .forEach(s=>{

        const div=document.createElement("div");
        div.className="item";
        div.textContent=s.stop_name;

        div.onclick=()=>{
            currentStop=s.stop_id;
            searchInput.value=s.stop_name;
            resultsBox.style.display="none";
            render();
        };

        resultsBox.appendChild(div);
    });

    resultsBox.style.display="block";
});

/* ================= CSV ================= */
function parseCSV(text){
    const lines=text.split("\n").filter(Boolean);
    const headers=lines[0].split(",");
    const out=[];

    for(let i=1;i<lines.length;i++){
        const obj={};
        const vals=lines[i].split(",");
        headers.forEach((h,j)=>obj[h.trim()]=vals[j]);
        out.push(obj);
    }
    return out;
}

/* ================= GTFS AUTO LOAD ================= */
async function loadGTFS(){

    const JSZipLib=(await import("https://cdn.jsdelivr.net/npm/jszip@3.10.1/+esm")).default;

    const file=await fetch("gtfs.zip");
    const zip=await JSZipLib.loadAsync(await file.arrayBuffer());

    const read=name=>zip.file(name).async("string");

    stops=parseCSV(await read("stops.txt"));
    stopTimes=parseCSV(await read("stop_times.txt"));
    trips=parseCSV(await read("trips.txt"));
    routes=parseCSV(await read("routes.txt"));

    stops.forEach(s=>stopsById[s.stop_id]=s);
    trips.forEach(t=>tripsById[t.trip_id]=t);
    routes.forEach(r=>routesById[r.route_id]=r);

    stopTimes.forEach(st=>{
        (stopTimesByStop[st.stop_id]??=[]).push(st);
        (stopTimesByTrip[st.trip_id]??=[]).push(st);
    });

    Object.keys(stopTimesByTrip).forEach(id=>{
        stopTimesByTrip[id].sort((a,b)=>a.stop_sequence-b.stop_sequence);
    });

    const def=stops.find(s=>s.stop_name===DEFAULT_STATION);
    if(def){
        currentStop=def.stop_id;
        searchInput.value=def.stop_name;
    }

    render();
}

loadGTFS();

/* ================= TIME ================= */
function timeToSeconds(t){
    if(!t) return 999999;
    const [h,m,s]=t.split(":").map(Number);
    return h*3600+m*60+(s||0);
}

function leftTime(t){
    const now=new Date();
    const nowSec=now.getHours()*3600+now.getMinutes()*60+now.getSeconds();

    let diff=timeToSeconds(t)-nowSec;

    if(diff<=0) return "ODJECHAŁ";

    const h=Math.floor(diff/3600);
    diff%=3600;
    const m=Math.floor(diff/60);
    const s=diff%60;

    return `${h}h ${m}m ${s}s`;
}

/* ================= GOOGLE POLISH ONLY ================= */
function speak(text){

    speechSynthesis.cancel();

    const u=new SpeechSynthesisUtterance(text);

    const voices=speechSynthesis.getVoices();
    const pl=voices.find(v=>v.lang==="pl-PL" && v.name.toLowerCase().includes("google"));

    if(pl) u.voice=pl;

    u.lang="pl-PL";
    u.rate=0.85;

    speechSynthesis.speak(u);
}

/* ================= FULL ANNOUNCEMENT (RESTORED) ================= */
function departureAnnouncement(d){

    const platform=d.platform || "?";
    let operator="Pociąg";

    const line=(d.line||"").toUpperCase();

    if(line.includes("ICE")) operator="Intercity Express";
    else if(line.includes("EC")) operator="EuroCity";
    else if(line.includes("IC")) operator="Intercity";
    else if(line.includes("RJ")) operator="Railjet";
    else if(line.includes("TGV")) operator="T G V";
    else if(line.startsWith("S")) operator="S-Bahn";

    const now=new Date();
    const time=`${now.getHours()} ${now.getMinutes()}`;

    const text=
`Peron ${platform}, dla godziny ${time} pociąg ${operator} do ${d.dest}. Ten pociąg składa się z ${d.coaches} wagonów.`;

    speak(text);
}

/* ================= RENDER ================= */
function render(){

    if(!currentStop) return;

    const board=document.getElementById("board");
    board.innerHTML="";

    const now=new Date();
    const nowSec=now.getHours()*3600+now.getMinutes()*60+now.getSeconds();

    const list=(stopTimesByStop[currentStop]||[]).map(st=>{

        const trip=tripsById[st.trip_id];
        const route=routesById[trip?.route_id];

        return{
            id:st.trip_id,
            line:route?.route_short_name||"?",
            dest:trip?.trip_headsign||"?",
            time:st.departure_time,
            platform:st.platform_code||"?",
            coaches:5
        };
    });

    const unique=new Map();
    list.forEach(x=>unique.set(x.id,x));

    [...unique.values()].forEach(d=>{

        const depSec=timeToSeconds(d.time);
        const diff=depSec-nowSec;

        if(diff<-15) return;

        const tr=document.createElement("tr");

        tr.innerHTML=`
        <td>POCIĄG</td>
        <td>${d.line}</td>
        <td>${d.dest}</td>
        <td>${d.platform}</td>
        <td>${d.coaches}</td>
        <td>-</td>
        <td>${leftTime(d.time)}</td>
        <td class="on">OK</td>
        `;

        board.appendChild(tr);

        /* 3 MIN BEFORE ANNOUNCEMENT */
        const key=d.id+"_"+d.time;

        if(diff<=180 && diff>0 && !announced[key]){
            departureAnnouncement(d);
            announced[key]=true;
        }
    });
}

setInterval(render,1000);

function toggleFullscreen(){
    document.documentElement.requestFullscreen();
}

</script>
</body>
</html>
