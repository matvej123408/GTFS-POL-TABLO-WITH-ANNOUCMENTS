<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SYSTEM ODJAZDÓW W EUROPIE</title>

<style>
body{
    margin:0;
    background:black;
    color:#ffcc00;
    font-family:Arial;
}

header{
    background:#111;
    padding:15px;
    text-align:center;
    font-size:40px;
    border-bottom:4px solid #ffcc00;
}

#menu{
    display:flex;
    gap:10px;
    padding:10px;
    background:#0a0a0a;
    flex-wrap:wrap;
    align-items:center;
    position:relative;
}

#search{
    padding:10px;
    width:320px;
    background:#111;
    color:#ffcc00;
    border:1px solid #333;
}

button{
    padding:10px;
    background:#111;
    color:#ffcc00;
    border:1px solid #333;
    cursor:pointer;
}

#results{
    position:absolute;
    top:60px;
    left:10px;
    background:#111;
    width:320px;
    max-height:250px;
    overflow:auto;
    display:none;
    border:1px solid #333;
    z-index:9999;
}

.item{
    padding:10px;
    cursor:pointer;
}

.item:hover{background:#222;}

table{
    width:100%;
    border-collapse:collapse;
    font-size:20px;
}

th,td{
    padding:10px;
    text-align:center;
    border-bottom:1px solid #222;
}

th{
    background:#111;
    border-bottom:3px solid #ffcc00;
}

tr:nth-child(even){background:#0a0a0a;}

.on{color:#00ff66;}
</style>
</head>

<body>

<header>SYSTEM ODJAZDÓW W EUROPIE</header>

<div id="menu">
<input id="search" placeholder="Szukaj stacji...">
<button onclick="toggleFullscreen()">PEŁNY EKRAN</button>
<div id="results"></div>
</div>

<table>
<thead>
<tr>
<th>Typ</th>
<th>Linia</th>
<th>Cel podróży</th>
<th>Peron</th>
<th>Wagony</th>
<th>Zatrzymuje się na</th>
<th>Odjazd</th>
<th>Status</th>
</tr>
</thead>
<tbody id="board"></tbody>
</table>

<script>

/* ================= DATA ================= */

let stops=[], stopTimes=[], trips=[], routes=[];
let currentStop=null;

let stopsById={}, tripsById={}, routesById={};
let stopTimesByStop={}, stopTimesByTrip={};
let callingAtCache={};
let announced={};

let selectedVoice=null;

/* ================= SEARCH ================= */

const searchInput=document.getElementById("search");
const resultsBox=document.getElementById("results");

searchInput.addEventListener("input",()=>{

    const q=searchInput.value.toLowerCase().trim();
    resultsBox.innerHTML="";

    if(!q){
        resultsBox.style.display="none";
        return;
    }

    const seen=new Set();

    stops
    .filter(s=>s.stop_name && s.stop_name.toLowerCase().includes(q))
    .filter(s=>{
        if(seen.has(s.stop_name)) return false;
        seen.add(s.stop_name);
        return true;
    })
    .slice(0,50)
    .forEach(s=>{

        const div=document.createElement("div");
        div.className="item";
        div.textContent=s.stop_name;

        div.onclick=()=>{
            currentStop=s.stop_id;
            searchInput.value=s.stop_name;
            resultsBox.style.display="none";
            render();
        };

        resultsBox.appendChild(div);

    });

    resultsBox.style.display="block";
});

document.addEventListener("click",(e)=>{
    if(!document.getElementById("menu").contains(e.target)){
        resultsBox.style.display="none";
    }
});

/* ================= CSV ================= */

function parseCSV(text){

    const lines=text.split("\n").filter(Boolean);
    const headers=lines[0].split(",");
    const out=[];

    for(let i=1;i<lines.length;i++){
        const obj={};
        const values=lines[i].split(",");

        for(let j=0;j<headers.length;j++){
            obj[headers[j].trim()]=values[j]?.trim();
        }

        out.push(obj);
    }

    return out;
}

/* ================= POLISH GOOGLE VOICE ONLY ================= */

function loadVoice(){

    const voices = speechSynthesis.getVoices();

    selectedVoice =
        voices.find(v =>
            v.lang.includes("pl") &&
            v.name.toLowerCase().includes("google")
        ) ||
        voices.find(v => v.lang.includes("pl")) ||
        null;
}

speechSynthesis.onvoiceschanged=loadVoice;

/* ================= SPEECH ================= */

function speak(text){

    speechSynthesis.cancel();

    const u=new SpeechSynthesisUtterance(text);

    u.rate=0.75;
    u.lang="pl-PL";

    if(selectedVoice){
        u.voice=selectedVoice;
    }

    speechSynthesis.speak(u);
}

/* ================= AUTO LOAD GTFS ================= */

async function loadGTFS(){

    const JSZipLib = (await import("https://cdn.jsdelivr.net/npm/jszip@3.10.1/+esm")).default;

    const file = await fetch("gtfs.zip");

    if(!file.ok){
        alert("Brak gtfs.zip");
        return;
    }

    const zip = await JSZipLib.loadAsync(await file.arrayBuffer());

    async function read(name){
        const f = zip.file(name);
        return await f.async("string");
    }

    stops=parseCSV(await read("stops.txt"));
    stopTimes=parseCSV(await read("stop_times.txt"));
    trips=parseCSV(await read("trips.txt"));
    routes=parseCSV(await read("routes.txt"));

    stopsById={};
    tripsById={};
    routesById={};
    stopTimesByStop={};
    stopTimesByTrip={};

    for(const s of stops) stopsById[s.stop_id]=s;
    for(const t of trips) tripsById[t.trip_id]=t;
    for(const r of routes) routesById[r.route_id]=r;

    for(const st of stopTimes){

        if(!stopTimesByStop[st.stop_id]) stopTimesByStop[st.stop_id]=[];
        if(!stopTimesByTrip[st.trip_id]) stopTimesByTrip[st.trip_id]=[];

        stopTimesByStop[st.stop_id].push(st);
        stopTimesByTrip[st.trip_id].push(st);
    }

    for(const id in stopTimesByTrip){
        stopTimesByTrip[id].sort((a,b)=>
            Number(a.stop_sequence)-Number(b.stop_sequence)
        );
    }

    alert("GTFS loaded");
}

loadGTFS();

/* ================= HELPERS ================= */

function timeToSeconds(t){
    if(!t) return 999999;
    const [h,m,s]=t.split(":").map(Number);
    return h*3600+m*60+(s||0);
}

function getCallingAt(tripId,stopId){

    const key=tripId+"_"+stopId;
    if(callingAtCache[key]) return callingAtCache[key];

    const list=stopTimesByTrip[tripId]||[];
    let found=false;
    const out=[];

    for(const s of list){
        if(s.stop_id===stopId){found=true;continue;}
        if(found){
            const st=stopsById[s.stop_id];
            if(st) out.push(st.stop_name);
        }
    }

    const res=out.length?out.join(", "):"Brak dalszych przystanków";
    callingAtCache[key]=res;
    return res;
}

/* ================= COACHES ================= */

function getCoachCount(line){

    const l=(line||"").toUpperCase();

    if(l.includes("ICE")) return 12;
    if(l.includes("IC")) return 8;
    if(l.includes("EC")) return 9;
    if(l.includes("RJ")) return 7;
    if(l.includes("TGV")) return 10;
    if(l.includes("RE")) return 5;
    if(l.includes("RB")) return 3;
    if(l.includes("S")) return 4;

    return 5;
}

/* ================= FULL ORIGINAL ANNOUNCEMENT SYSTEM ================= */

function departureAnnouncement(d){

    const platform=d.platform || "?";

    let operator="Pociąg";

    const upperLine=(d.line || "").toUpperCase();

    if(upperLine.includes("ICE")) operator="Intercity Express";
    else if(upperLine.includes("EC")) operator="EuroCity";
    else if(upperLine.includes("IC")) operator="Intercity";
    else if(upperLine.includes("RJ")) operator="Railjet";
    else if(upperLine.includes("TGV")) operator="T G V";
    else if(upperLine.includes("S")) operator="S-Bahn";

    const destination=d.dest;
    const coaches=d.coaches;

    const now=new Date();
    const hh=now.getHours();
    const mm=now.getMinutes();

    const time=
        hh===0 && mm===0
        ? "Północ"
        : mm===0
        ? `godzina ${hh}`
        : `${hh} ${mm}`;

    const callingAt=getCallingAt(d.trip_id,currentStop);

    const text=
`Peron ${platform}, dla godziny ${time} pociąg ${operator} do: ${destination}. Zatrzymuje się na: ${callingAt}, oraz ${destination}. Ten pociąg składa się z ${coaches} wagonów.`;

    speak(text);
}

/* ================= RENDER ================= */

function render(){

    if(!currentStop) return;

    const board=document.getElementById("board");
    board.innerHTML="";

    const stopData=stopTimesByStop[currentStop]||[];

    stopData.slice(0,15).forEach(t=>{

        const trip=tripsById[t.trip_id];
        const route=routesById[trip?.route_id];

        const line=route?.route_short_name||"??";

        const d={
            trip_id:t.trip_id,
            line:line,
            dest:trip?.trip_headsign||"?",
            time:t.departure_time,
            platform:t.platform_code||"?",
            coaches:getCoachCount(line)
        };

        const tr=document.createElement("tr");

        tr.innerHTML=`
        <td>POCIĄG</td>
        <td>${d.line}</td>
        <td>${d.dest}</td>
        <td>${d.platform}</td>
        <td>${d.coaches}</td>
        <td>${getCallingAt(d.trip_id,currentStop)}</td>
        <td>${d.time}</td>
        <td class="on">OK</td>
        `;

        board.appendChild(tr);

        const key=d.trip_id+"_"+d.time;

        if(!announced[key]){
            departureAnnouncement(d);
            announced[key]=true;
        }

    });
}

setInterval(()=>{if(currentStop)render();},1000);

/* ================= FULLSCREEN ================= */

function toggleFullscreen(){
    document.documentElement.requestFullscreen();
}

</script>

</body>
</html>
