<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SYSTEM ODJAZDÓW W EUROPIE</title>

<style>
body{
    margin:0;
    background:black;
    color:#ffcc00;
    font-family:Arial;
}

header{
    background:#111;
    padding:15px;
    text-align:center;
    font-size:40px;
    border-bottom:4px solid #ffcc00;
}

#menu{
    display:flex;
    gap:10px;
    padding:10px;
    background:#0a0a0a;
    flex-wrap:wrap;
    align-items:center;
    position:relative;
}

#search{
    padding:10px;
    width:320px;
    background:#111;
    color:#ffcc00;
    border:1px solid #333;
}

select,button{
    padding:10px;
    background:#111;
    color:#ffcc00;
    border:1px solid #333;
    cursor:pointer;
}

#results{
    position:absolute;
    top:60px;
    left:10px;
    background:#111;
    width:320px;
    max-height:250px;
    overflow:auto;
    display:none;
    border:1px solid #333;
    z-index:9999;
}

.item{
    padding:10px;
    cursor:pointer;
}

.item:hover{
    background:#222;
}

table{
    width:100%;
    border-collapse:collapse;
    font-size:20px;
}

th,td{
    padding:10px;
    text-align:center;
    border-bottom:1px solid #222;
}

th{
    background:#111;
    border-bottom:3px solid #ffcc00;
}

tr:nth-child(even){
    background:#0a0a0a;
}

.on{color:#00ff66;}
.cancel{color:#ff4444;}
.delay{color:#ff8800;}
</style>
</head>

<body>

<header>SYSTEM ODJAZDÓW W EUROPIE</header>

<div id="menu">

<input id="search" placeholder="Szukaj stacji...">

<select id="langSelect">
<option value="pl-PL">Polski</option>
</select>

<button onclick="toggleFullscreen()">PEŁNY EKRAN</button>

<div id="results"></div>

</div>

<table>
<thead>
<tr>
<th>Typ</th>
<th>Linia</th>
<th>Cel podróży</th>
<th>Peron</th>
<th>Wagony</th>
<th>Zatrzymuje się na</th>
<th>Odjazd</th>
<th>Status</th>
</tr>
</thead>

<tbody id="board"></tbody>
</table>

<audio id="gong"></audio>

<script>

/* ================= DATA ================= */

let stops=[], stopTimes=[], trips=[], routes=[];
let currentStop=null;

let selectedVoice=null;
let announced={};

let stopsById={};
let tripsById={};
let routesById={};

let stopTimesByStop={};
let stopTimesByTrip={};

let callingAtCache={};

/* ================= DEFAULT FILTER ================= */
const DEPARTURE_SOON_LIMIT = 2 * 60 * 60; // 2 hours

/* ================= SEARCH ================= */

const searchInput=document.getElementById("search");
const resultsBox=document.getElementById("results");

searchInput.addEventListener("input",()=>{

    const q=searchInput.value.toLowerCase().trim();
    resultsBox.innerHTML="";

    if(!q){
        resultsBox.style.display="none";
        return;
    }

    const seen=new Set();

    stops
    .filter(s=>s.stop_name && s.stop_name.toLowerCase().includes(q))
    .filter(s=>{
        if(seen.has(s.stop_name)) return false;
        seen.add(s.stop_name);
        return true;
    })
    .slice(0,50)
    .forEach(s=>{

        const div=document.createElement("div");
        div.className="item";
        div.textContent=s.stop_name;

        div.onclick=()=>{
            currentStop=s.stop_id;
            searchInput.value=s.stop_name;
            resultsBox.style.display="none";
            render();
        };

        resultsBox.appendChild(div);
    });

    resultsBox.style.display="block";
});

document.addEventListener("click",(e)=>{
    if(!document.getElementById("menu").contains(e.target)){
        resultsBox.style.display="none";
    }
});

/* ================= CSV ================= */

function parseCSV(text){
    const lines=text.split("\n").filter(Boolean);
    const headers=lines[0].split(",");
    const out=[];

    for(let i=1;i<lines.length;i++){
        const obj={};
        const values=lines[i].split(",");

        for(let j=0;j<headers.length;j++){
            obj[headers[j].trim()] = values[j]?.trim();
        }
        out.push(obj);
    }
    return out;
}

/* ================= VOICE (ONLY GOOGLE PL-PL) ================= */

function loadVoices(){
    const voices = speechSynthesis.getVoices();

    selectedVoice =
        voices.find(v =>
            v.lang === "pl-PL" &&
            v.name.toLowerCase().includes("google")
        ) ||
        voices.find(v => v.lang === "pl-PL") ||
        voices[0];
}

speechSynthesis.onvoiceschanged=loadVoices;
loadVoices();

/* ================= SPEECH ================= */

function speak(text){
    speechSynthesis.cancel();

    const u=new SpeechSynthesisUtterance(text);
    u.rate=0.75;
    u.lang="pl-PL";

    if(selectedVoice){
        u.voice=selectedVoice;
    }

    speechSynthesis.speak(u);
}

/* ================= AUTO LOAD GTFS ================= */

async function loadGTFS(){

    const JSZipLib=(await import("https://cdn.jsdelivr.net/npm/jszip@3.10.1/+esm")).default;

    const file=await fetch("gtfs.zip");
    const zip=await JSZipLib.loadAsync(await file.arrayBuffer());

    async function read(n){
        return await zip.file(n).async("string");
    }

    stops=parseCSV(await read("stops.txt"));
    stopTimes=parseCSV(await read("stop_times.txt"));
    trips=parseCSV(await read("trips.txt"));
    routes=parseCSV(await read("routes.txt"));

    stopsById={};
    tripsById={};
    routesById={};

    stopTimesByStop={};
    stopTimesByTrip={};

    for(const s of stops) stopsById[s.stop_id]=s;
    for(const t of trips) tripsById[t.trip_id]=t;
    for(const r of routes) routesById[r.route_id]=r;

    for(const st of stopTimes){

        if(!stopTimesByStop[st.stop_id]) stopTimesByStop[st.stop_id]=[];
        if(!stopTimesByTrip[st.trip_id]) stopTimesByTrip[st.trip_id]=[];

        stopTimesByStop[st.stop_id].push(st);
        stopTimesByTrip[st.trip_id].push(st);
    }

    for(const id in stopTimesByTrip){
        stopTimesByTrip[id].sort((a,b)=>
            Number(a.stop_sequence)-Number(b.stop_sequence)
        );
    }

    /* DEFAULT STATION = LUBLIN GŁÓWNY */
    const lublin = stops.find(s=>s.stop_name.includes("Lublin Główny"));
    if(lublin){
        currentStop = lublin.stop_id;
        searchInput.value = lublin.stop_name;
    }

    render();
}

loadGTFS();

/* ================= TIME ================= */

function timeToSeconds(t){
    if(!t) return 999999;
    const [h,m,s]=t.split(":").map(Number);
    return h*3600 + m*60 + (s||0);
}

function getTimeLeft(time){

    const now=new Date();

    const nowSec=
        now.getHours()*3600+
        now.getMinutes()*60+
        now.getSeconds();

    const dep=timeToSeconds(time);

    let diff=dep-nowSec;

    if(diff<=0) return "ODJECHAŁ";

    const h=Math.floor(diff/3600);
    diff%=3600;
    const m=Math.floor(diff/60);
    const s=diff%60;

    return `${h}h ${m}m ${s}s`;
}

/* ================= FILTER ================= */

function isSoon(time){
    const now=new Date();
    const nowSec=now.getHours()*3600+now.getMinutes()*60+now.getSeconds();
    return (timeToSeconds(time)-nowSec) <= DEPARTURE_SOON_LIMIT;
}

/* ================= CALLING AT ================= */

function getCallingAt(tripId,stopId){

    const key=tripId+"_"+stopId;
    if(callingAtCache[key]) return callingAtCache[key];

    const list=stopTimesByTrip[tripId] || [];
    let found=false;
    const out=[];

    for(const s of list){
        if(s.stop_id===stopId){ found=true; continue; }
        if(found){
            const st=stopsById[s.stop_id];
            if(st) out.push(st.stop_name);
        }
    }

    const res=out.length?out.join(", "):"Brak dalszych przystanków";
    callingAtCache[key]=res;
    return res;
}

/* ================= ANNOUNCEMENTS (KEPT) ================= */

function departureAnnouncement(d){

    const text =
`Peron ${d.platform}, pociąg ${d.line} do ${d.dest}. Odjazd ${d.time}.`;

    speak(text);
}

/* ================= RENDER ================= */

function render(){

    if(!currentStop) return;

    const board=document.getElementById("board");
    board.innerHTML="";

    const data=(stopTimesByStop[currentStop]||[])
    .filter(t=>isSoon(t.departure_time))
    .map(t=>{

        const trip=tripsById[t.trip_id];
        const route=routesById[trip?.route_id];

        return {
            trip_id:t.trip_id,
            line:route?.route_short_name || "IC",
            dest:trip?.trip_headsign || "—",
            time:t.departure_time,
            platform:t.platform_code || "?",
            coaches:8
        };

    })
    .sort((a,b)=>timeToSeconds(a.time)-timeToSeconds(b.time));

    const frag=document.createDocumentFragment();

    data.slice(0,15).forEach(d=>{

        const tr=document.createElement("tr");

        tr.innerHTML=`
        <td>POCIĄG</td>
        <td>${d.line}</td>
        <td>${d.dest}</td>
        <td>${d.platform}</td>
        <td>${d.coaches}</td>
        <td>${getCallingAt(d.trip_id,currentStop)}</td>
        <td>${getTimeLeft(d.time)}</td>
        <td class="on">OK</td>
        `;

        frag.appendChild(tr);

    });

    board.appendChild(frag);
}

/* ================= FULLSCREEN ================= */

function toggleFullscreen(){
    document.documentElement.requestFullscreen();
}

/* ================= LOOP ================= */

setInterval(()=>{ if(currentStop) render(); },1000);

</script>

</body>
</html>
